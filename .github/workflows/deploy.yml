# Phase 5.1 — two-job pipeline: ubuntu build → self-hosted Windows deploy.
# Phase 6 Plan 06-06 added eval gating. See
# .planning/phases/06-telemetry-evals-and-pilot-hardening/06-06-ci-cd-integration-PLAN.md
name: Deploy to On-Prem Windows

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      skip_eval_gate:
        description: 'Emergency bypass — skip 48h nightly-eval metadata gate'
        type: boolean
        default: false

env:
  NODE_VERSION: '20.x'

jobs:
  build:
    name: Build standalone bundle
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Test (unit)
        run: pnpm test

      - name: Fast evals (deterministic hard gate)
        run: pnpm eval:fast
        # Required: fails the pipeline if entity-allowlist or citation-substring
        # threshold is missed. No LLM_JUDGE_API_KEY needed — fast suites are
        # deterministic string-match only. This is a HARD gate — no bypass.

      - name: Build (Next.js standalone)
        # Phase 5.1 — no build-time Entra/client-side auth secrets injected.
        # All auth is server-side (iron-session + msal-node) and reads env at
        # request time from AWS Secrets Manager on the Windows box. Build-
        # time secrets are no longer required.
        run: pnpm build

      - name: Assemble standalone bundle
        # Pitfall 3 — Next.js standalone output OMITS `public/` and
        # `.next/static/`. Must copy them in before tarring or the deployed
        # bundle returns 404 for all public assets.
        run: |
          cp -r public .next/standalone/public
          cp -r .next/static .next/standalone/.next/static

      - name: Package artifact
        run: tar -czf kbassistant-build.tar.gz -C .next/standalone .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: kbassistant-build
          path: kbassistant-build.tar.gz
          retention-days: 3

  check-evals:
    name: Verify nightly eval is green (48h window)
    runs-on: ubuntu-latest
    needs: build
    if: ${{ inputs.skip_eval_gate != true }}
    steps:
      - name: Check for recent green nightly eval
        uses: actions/github-script@v7
        with:
          script: |
            const cutoff = Date.now() - 48 * 60 * 60 * 1000
            const runs = await github.rest.actions.listWorkflowRunsForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'evals-nightly.yml',
              per_page: 10,
            })
            const recentGreen = runs.data.workflow_runs.find(
              r => r.conclusion === 'success' && new Date(r.updated_at).getTime() > cutoff
            )
            if (!recentGreen) {
              core.setFailed(
                'No green nightly eval run in the last 48h. Deploy blocked. ' +
                'See docs/ops/eval-gate-bypass-procedure.md for emergency bypass.'
              )
              return
            }
            // Two-consecutive-red detection:
            const recentRuns = runs.data.workflow_runs.slice(0, 2)
            if (recentRuns.length === 2 && recentRuns.every(r => r.conclusion === 'failure')) {
              core.setFailed(
                'Last 2 nightly eval runs both red. Deploy blocked — ' +
                'investigate before shipping.'
              )
            }

  deploy:
    name: Deploy to Windows box
    runs-on: [self-hosted, windows, kbassistant]
    needs: [build, check-evals]
    if: always() && needs.build.result == 'success' && (needs.check-evals.result == 'success' || needs.check-evals.result == 'skipped')
    environment: production
    env:
      KBASSISTANT_DEPLOY_ROOT: ${{ vars.KBASSISTANT_DEPLOY_ROOT || 'D:\kbroles\.next\standalone' }}
      KBASSISTANT_SCHEDULED_TASK: ${{ vars.KBASSISTANT_SCHEDULED_TASK || 'KbAssistant' }}
      KBASSISTANT_HEALTH_URL: ${{ vars.KBASSISTANT_HEALTH_URL || 'http://localhost:3001/api/health' }}
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: kbassistant-build

      - name: Stop Scheduled Task, swap files, start, canary
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $deployRoot = $env:KBASSISTANT_DEPLOY_ROOT
          $taskName   = $env:KBASSISTANT_SCHEDULED_TASK
          $healthUrl  = $env:KBASSISTANT_HEALTH_URL
          $prevRoot   = "$deployRoot.prev"

          Write-Host "Stopping scheduled task $taskName..."
          schtasks /end /tn $taskName | Out-Null
          # schtasks /end returns exit 1 if the task is not currently running — tolerate.

          # Rotate: previous .prev (if any) → gone; current → .prev; new → current.
          if (Test-Path $prevRoot) {
            Write-Host "Removing stale $prevRoot..."
            Remove-Item $prevRoot -Recurse -Force
          }
          if (Test-Path $deployRoot) {
            Write-Host "Rotating $deployRoot -> $prevRoot..."
            Rename-Item -Path $deployRoot -NewName ([System.IO.Path]::GetFileName($prevRoot))
          }

          Write-Host "Extracting new bundle into $deployRoot..."
          New-Item -ItemType Directory -Path $deployRoot -Force | Out-Null
          tar -xzf kbassistant-build.tar.gz -C $deployRoot

          Write-Host "Starting scheduled task $taskName..."
          schtasks /run /tn $taskName
          if ($LASTEXITCODE -ne 0) {
            throw "schtasks /run failed with exit $LASTEXITCODE"
          }

          Write-Host "Waiting 30s for service warm-up..."
          Start-Sleep -Seconds 30

          Write-Host "Canary smoke: $healthUrl"
          $response = Invoke-RestMethod -Uri $healthUrl -TimeoutSec 15
          if ($response.status -ne 'ok') {
            throw "Health check failed: $($response | ConvertTo-Json -Compress)"
          }
          Write-Host "Deploy verified: $($response | ConvertTo-Json -Compress)"

      - name: Rollback on failure
        if: failure()
        shell: pwsh
        run: |
          $deployRoot = $env:KBASSISTANT_DEPLOY_ROOT
          $taskName   = $env:KBASSISTANT_SCHEDULED_TASK
          $prevRoot   = "$deployRoot.prev"

          Write-Host "Rollback triggered. Stopping task..."
          schtasks /end /tn $taskName | Out-Null

          if (Test-Path $prevRoot) {
            if (Test-Path $deployRoot) {
              Remove-Item $deployRoot -Recurse -Force
            }
            Write-Host "Restoring $prevRoot -> $deployRoot..."
            Rename-Item -Path $prevRoot -NewName ([System.IO.Path]::GetFileName($deployRoot))
            schtasks /run /tn $taskName
            Write-Host "Rollback complete. Manual investigation required."
          } else {
            Write-Host "No $prevRoot to roll back to. Task remains stopped. Manual intervention required."
          }
